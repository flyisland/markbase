<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="markbase-version" content="__MARKBASE_BUILD_VERSION__" />
    <meta name="markbase-git-commit" content="__MARKBASE_GIT_COMMIT__" />
    <meta
      name="markbase-git-commit-time"
      content="__MARKBASE_GIT_COMMIT_TIME__"
    />
    <title>markbase</title>
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.css"
    />
    <style>
__MARKBASE_DOCSIFY_STYLE__
    </style>
  </head>
  <body>
    <!-- markbase-shell-version: __MARKBASE_BUILD_VERSION__ -->
    <div id="app">Loading...</div>
    <footer class="mb-shell-footer">
      <span class="mb-shell-footer-label">Generated by markbase</span>
      <span class="mb-shell-footer-value">v__MARKBASE_BUILD_VERSION__</span>
      <span class="mb-shell-footer-separator">•</span>
      <span class="mb-shell-footer-value">commit __MARKBASE_GIT_COMMIT__</span>
      <span class="mb-shell-footer-separator">•</span>
      <span class="mb-shell-footer-value">__MARKBASE_GIT_COMMIT_TIME__</span>
    </footer>
    <script>
      window.$docsify = {
        name: "markbase",
        homepage: __MARKBASE_DOCSIFY_HOMEPAGE__,
        basePath: "/",
        ext: "",
        externalLinkTarget: "_self",
        noCompileLinks: ["/.*\\.md(?:[?#].*)?", "/.*\\.base(?:[?#].*)?"],
        auto2top: true,
        plugins: [
          function (hook) {
__MARKBASE_DOCSIFY_SCRIPT__
          },
        ],
      };
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  </body>
</html>
